<style>

    --red: #C0392B; --red-bg: #FDECEA;
    --amber: #C07A00; --amber-bg: #FFF4DC;

  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.5; }
  .app { display: flex; height: 100vh; overflow: hidden; }
  .sidebar { width: 220px; background: var(--text); display: flex; flex-direction: column; flex-shrink: 0; }
  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; height: 52px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .content { flex: 1; overflow-y: auto; padding: 24px; }
  .sidebar-logo { padding: 20px 18px 16px; border-bottom: 1px solid #333; }
  .logo-mark { display: flex; align-items: center; gap: 8px; }
  .logo-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); flex-shrink: 0; }
  .logo-text { font-size: 13px; font-weight: 600; color: #fff; line-height: 1.3; }
  .logo-sub { font-size: 10px; color: #888; font-weight: 400; }
  .nav-section { padding: 12px 0 4px; }
  .nav-label { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 0.08em; padding: 0 18px 6px; font-weight: 500; }
  .nav-item { display: flex; align-items: center; gap: 10px; padding: 8px 18px; cursor: pointer; color: #AAA; font-size: 13px; transition: all 0.15s; border-left: 2px solid transparent; }
  .nav-item:hover { color: #fff; background: #2A2A28; }
  .nav-item.active { color: var(--gold); border-left-color: var(--gold); background: #252520; }
  .nav-icon { font-size: 14px; width: 16px; text-align: center; }
  .sidebar-footer { margin-top: auto; padding: 16px 18px; border-top: 1px solid #333; font-size: 12px; color: #666; }
  .user-badge { display: flex; align-items: center; gap: 8px; }
  .avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; color: #1A1A18; flex-shrink: 0; }
  .page-title { font-size: 16px; font-weight: 600; color: var(--text); }
  .topbar-actions { display: flex; align-items: center; gap: 10px; }
  .btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; }
  .btn-primary { background: var(--gold); color: #1A1A18; border-color: var(--gold); }
  .btn-primary:hover { background: var(--gold-dark); border-color: var(--gold-dark); color: #fff; }
  .btn-secondary { background: var(--surface); color: var(--text-2); border-color: var(--border); }
  .btn-secondary:hover { background: var(--bg); }
  .btn-ghost { background: none; color: var(--text-2); border-color: transparent; }
  .btn-ghost:hover { background: var(--bg); }
  .btn-green { background: var(--green-bg); color: var(--green); border-color: var(--green); font-size: 12px; padding: 5px 12px; }
  .btn-green:hover { background: var(--green); color: #fff; }
  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 24px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; }
  .stat-label { font-size: 12px; color: var(--text-2); margin-bottom: 6px; font-weight: 500; }
  .stat-val { font-size: 28px; font-weight: 700; }
  .stat-val.gold { color: var(--gold-dark); }
  .stat-val.green { color: var(--green); }
  .stat-val.red { color: var(--red); }
  .stat-sub { font-size: 11px; color: var(--text-3); margin-top: 2px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 20px; }
  .card-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .card-title { font-size: 13px; font-weight: 600; color: var(--text); }
  .card-body { padding: 0; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { font-size: 11px; font-weight: 600; color: var(--text-2); text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--border); background: #FAFAF8; text-transform: uppercase; letter-spacing: 0.04em; white-space: nowrap; }
  td { padding: 11px 14px; border-bottom: 1px solid var(--border); color: var(--text); vertical-align: middle; }

  .prop-name { font-weight: 600; font-size: 13px; }
  .prop-sub { font-size: 11px; color: var(--text-3); }

  .badge-contract { background: var(--amber-bg); color: var(--amber); }
  .badge-withdrawn { background: #F0F0F0; color: var(--text-3); }

  .chk-yes { background: var(--green-bg); color: var(--green); }

  .closing-near { color: var(--red); font-weight: 600; }
  .closing-ok { color: var(--text-2); }

  .form-full { grid-column: 1 / -1; }
  .form-group { display: flex; flex-direction: column; gap: 5px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text-2); }

  .form-input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-light); }
  select.form-input { cursor: pointer; }
  textarea.form-input { resize: vertical; min-height: 80px; }
  .form-actions { padding: 16px 20px; border-top: 1px solid var(--border); display: flex; gap: 10px; justify-content: flex-end; }
  .form-section { padding: 16px 20px 4px; }
  .form-section-title { font-size: 11px; font-weight: 700; color: var(--text-3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 12px; }
  .detail-grid { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; }
  .detail-row { display: flex; justify-content: space-between; align-items: center; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .detail-row:last-child { border-bottom: none; }
  .detail-key { color: var(--text-2); font-weight: 500; }
  .detail-val { font-weight: 500; text-align: right; }
  .alert-box { display: flex; align-items: flex-start; gap: 8px; padding: 12px 14px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 14px; }
  .alert-warning { background: var(--amber-bg); color: var(--amber); border: 1px solid #F0D070; }

// ─── HELPERS ───────────────────────────────────────────────────────────────
function agentName(id) { const a = DATA.agents.find(x=>x.id===id); return a?a.name:id; }
function agentDot(id) { return `<span class="agent-dot ag-${id}">${agentName(id).substring(0,2).toUpperCase()}</span>`; }
function clientName(id) { const c = DATA.clients.find(x=>x.id===id); return c?c.name:'—'; }
function realtorName(id) { if(!id||id==='none') return '—'; const r = DATA.realtors.find(x=>x.id===id); return r?r.name:id; }
function countryFlag(c) { return c==='AR'?'🇦🇷':c==='US'?'🇺🇸':'🌐'; }

function chkCell(val, opId, key) {
  if (val === 'na') return `<span class="chk chk-na" onclick="event.stopPropagation();cycleChk(${opId},'${key}')" title="No aplica — click para cambiar">N/A</span>`;
  if (val === true) return `<span class="chk chk-yes" onclick="event.stopPropagation();cycleChk(${opId},'${key}')" title="Hecho — click para cambiar">✓</span>`;
  return `<span class="chk chk-no" onclick="event.stopPropagation();cycleChk(${opId},'${key}')" title="Pendiente — click para cambiar">–</span>`;
}

function calcProgress(o) {
  const keys = ['compSigned','escrow','lbp','sd','flood','condoDocs','condoRider','inspDone','reinsp'];
  const relevant = keys.filter(k => o[k] !== 'na');
  const done = relevant.filter(k => o[k] === true).length;
  const pct = relevant.length ? Math.round(done/relevant.length*100) : 0;
  return { done, total: relevant.length, pct };
}

function statusBadge(s) {
  const map = { 'ACTIVA':'badge-active','CERRADA':'badge-closed','CANCELADA':'badge-cancelled' };
  return `<span class="badge ${map[s]||''}">${s}</span>`;
}

function mlsStatusBadge(s, country) {
  const map = { published:'badge-mls', under_contract:'badge-contract', withdrawn:'badge-withdrawn' };
  const label = { published: country==='AR' ? 'En ZonaProp' : 'En MLS', under_contract:'Bajo contrato', withdrawn:'Retirada' };
  return `<span class="badge ${map[s]||''}">${label[s]||s}</span>`;
}

function toast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#1A1A18;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,0.2);';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2500);
}

// ─── ALERTS ────────────────────────────────────────────────────────────────
function getDaysUntil(isoDate) {
  if (!isoDate) return null;
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(isoDate); target.setHours(0,0,0,0);
  return Math.round((target - today) / 86400000);
}

function getAlerts() {
  const alerts = [];
  DATA.operations.filter(o=>o.status==='ACTIVA').forEach(o=>{
    if (o.closingDateISO) {
      const days = getDaysUntil(o.closingDateISO);
      if (days !== null && days <= 2) {
        const type = days < 0 ? 'danger' : 'warning';
        const msg = days < 0  ? `Closing vencido hace ${Math.abs(days)} día${Math.abs(days)===1?'':'s'}` :
                    days === 0 ? 'Closing es HOY' :
                                 `Closing en ${days} día${days===1?'':'s'}`;
        alerts.push({ type, opId:o.id, address:o.address, msg, icon:'🔔', kind:'closing' });
      }
    }
    if (o.inspEstimatedDate) {
      const days = getDaysUntil(o.inspEstimatedDate);
      if (days !== null && days <= 2) {
        const type = days < 0 ? 'danger' : 'warning';
        const msg = days < 0  ? `Fecha estimada de inspección vencida hace ${Math.abs(days)} día${Math.abs(days)===1?'':'s'}` :
                    days === 0 ? 'Inspección estimada es HOY' :
                                 `Inspección estimada en ${days} día${days===1?'':'s'}`;
        alerts.push({ type, opId:o.id, address:o.address, msg, icon:'🔍', kind:'insp' });
      }
    }
  });
  return alerts;
}

function renderAlertsPanel() {
  const alerts = getAlerts();
  if (!alerts.length) return '';
  return `<div class="alerts-panel">
    <div class="alerts-panel-header"><span class="alert-dot"></span>${alerts.length} alerta${alerts.length===1?'':'s'} activa${alerts.length===1?'':'s'}</div>
    ${alerts.map(a=>`
      <div class="alert-box alert-${a.type}" style="margin-bottom:8px;cursor:pointer;" onclick="goTo('op-detail',${a.opId})">
        <span style="margin-right:6px;">${a.icon}</span>
        <div>
          <strong>${a.address}</strong>
          <span style="margin:0 6px;opacity:0.5;">·</span>${a.msg}
          <span style="margin-left:8px;font-size:11px;opacity:0.7;">→ Ver operación</span>
        </div>
      </div>`).join('')}
  </div>`;
}

  else if (view==='mls') renderMLS(content,actions);

  else if (view==='comisiones') renderComisiones(content,actions);

}

function setLeadFilter(f){window._leadFilter=f;goTo('leads');}
function changeLeadStage(id,newStage){
  const l=DATA.leads.find(x=>x.id===id);
  if(!l)return;
  l.stage=newStage;
  const si=[...LEAD_STAGES,...LEAD_EXIT].find(s=>s.id===newStage);
  toast('✓ '+l.name+' → '+(si?si.label:newStage));
  goTo('leads');
}
function convertirACliente(id){
  const l=DATA.leads.find(x=>x.id===id);
  if(!l)return;
  if(l.stage==='convertido'){toast('Ya fue convertido a cliente');return;}
  const newId=Math.max(...DATA.clients.map(c=>c.id),0)+1;
  DATA.clients.push({id:newId,name:l.name,type:l.interest==='buyer'?'buyer':l.interest==='seller'?'seller':'investor',country:l.country,email:l.email||'',phone:l.phone||'',nationality:l.country==='AR'?'AR':'US',llc:'',ops:0,source:l.source||'',budget:l.budget||0,horizon:l.horizon||'',roi:l.roi||'',interestedProps:l.interestedProps?[...l.interestedProps]:[]});
  l.stage='convertido';
  toast('✓ '+l.name+' agregado a Clientes');
  goTo('leads');
}
function addPropToLead(leadId){
  const l=DATA.leads.find(x=>x.id===leadId);if(!l)return;
  l.interestedProps=l.interestedProps||[];
  const sel=document.getElementById('pis-'+leadId);
  const pid=parseInt(sel&&sel.value);
  if(!pid){toast('⚠ Seleccioná una propiedad');return;}
  if(l.interestedProps.includes(pid)){toast('Ya está asignada');return;}
  l.interestedProps.push(pid);
  openLeadDetail(leadId);
  toast('✓ Propiedad asignada');
}

function checkPropertyMatches(prop){
  const matches=[];
  const pool=[...DATA.leads.filter(l=>!['perdido','basura','convertido'].includes(l.stage)),...DATA.clients];
  pool.forEach(person=>{
    const budget=person.budget||0;if(!budget)return;
    const cOk=prop.country===person.country||(person.country!=='US'&&person.country!=='AR');
    const bOk=prop.price>=budget*0.5&&prop.price<=budget*1.3;
    if(cOk&&bOk)matches.push(person.name);
  });
  if(matches.length){
    const names=matches.slice(0,3).join(', ')+(matches.length>3?' y '+(matches.length-3)+' más':'');
    toast('🎯 '+prop.address+' coincide con: '+names,5000);
  }
  return matches;
}

function importClientesCSV() {
  const input=document.createElement('input');input.type='file';input.accept='.csv';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const lines=ev.target.result.split('\n').filter(l=>l.trim());
      const headers=lines[0].split(',').map(h=>h.trim().toLowerCase());
      let count=0;
      for(let i=1;i<lines.length;i++){
        const vals=lines[i].split(',');const obj={};
        headers.forEach((h,j)=>obj[h]=(vals[j]||'').trim());
        if(!obj.nombre)continue;
        const maxId=DATA.clients.length?Math.max(...DATA.clients.map(c=>c.id)):0;
        DATA.clients.push({id:maxId+1,name:obj.nombre,type:obj.tipo||'buyer',
          email:obj.email||'',phone:obj.telefono||'',nationality:obj.pais||'',
          country:'US',llc:obj.llc||'',ops:0,source:obj.fuente||'',
          interest:obj.interes||'buyer',budget:parseFloat(obj.presupuesto)||0,
          horizon:'',roi:'',status:'busqueda',contactHistory:[],interestedProps:[]});
        count++;
      }
      goTo('clientes');toast('\u2713 '+count+' clientes importados');
    };reader.readAsText(file);
  };input.click();
}

  if (!list.length) return '<div style="padding:32px;text-align:center;color:var(--text-3);font-size:13px;">Sin resultados</div>';

    c.contactHistory = c.contactHistory||[];
    c.status = c.status||'activo';
    const lastC = c.contactHistory.length ? c.contactHistory[c.contactHistory.length-1].date : null;

    const dc = dias===null?'var(--text-3)':dias>30?'var(--red)':dias>15?'var(--amber)':'var(--green)';

      '</tr>';
    }).join('') + '</tbody></table>';

function filterMLS(status, city) {

function fmtDate(s) {
  if (!s) return '';
  // strip time portion "2026-06-16 00:00:00" → "2026-06-16"
  const d = String(s).split(' ')[0].split('T')[0];
  const parts = d.split('-');
  if (parts.length === 3) return parts[2]+'/'+parts[1]+'/'+parts[0];
  return s;
}

  window.renderInteresadosList = renderList;

  const availLeads = DATA.leads.filter(l=>!['perdido','basura','convertido'].includes(l.stage)&&!(l.interestedProps||[]).includes(propId));

function removeLeadInterest(leadId, propId) {

  const el = document.getElementById('int-list');

  toast('✓ Removido');
}
function removeClientInterest(clientId, propId) {
  const c = DATA.clients.find(x=>x.id===clientId);
  if (c) c.interestedProps = (c.interestedProps||[]).filter(x=>x!==propId);
  const el = document.getElementById('int-list');

  toast('✓ Removido');

function addInteresado(propId) {
  const sel = document.getElementById('int-add-sel');
  const val = sel && sel.value;
  if (!val) { toast('⚠ Seleccioná un lead o cliente'); return; }
  const type = val[0]; // 'L' or 'C'
  const id = parseInt(val.slice(1));
  if (type === 'L') {
    const l = DATA.leads.find(x=>x.id===id);
    if (!l) return;
    l.interestedProps = l.interestedProps||[];
    if (!l.interestedProps.includes(propId)) l.interestedProps.push(propId);
  } else {
    const c = DATA.clients.find(x=>x.id===id);
    if (!c) return;
    c.interestedProps = c.interestedProps||[];
    if (!c.interestedProps.includes(propId)) c.interestedProps.push(propId);
  }
  // Refresh the modal
  const listEl = document.getElementById('int-list');
  if (listEl && window.renderInteresadosList) listEl.innerHTML = window.renderInteresadosList();
  // Update select: remove assigned option
  sel.querySelector('option[value="'+val+'"]')&&sel.querySelector('option[value="'+val+'"]').remove();
  sel.value = '';
  toast('✓ Asignado como interesado');
}

function quickAddPropCliente(clientId) {
  const sel = document.getElementById('pac-sel-'+clientId);
  const pid = parseInt(sel&&sel.value);
  if (!pid) { toast('⚠ Seleccioná una propiedad'); return; }
  const c = DATA.clients.find(x=>x.id===clientId);
  if (!c) return;
  c.interestedProps = c.interestedProps||[];
  if (!c.interestedProps.includes(pid)) c.interestedProps.push(pid);
  openPropAssignModalCliente(clientId);
  toast('✓ Propiedad asignada');
}

  el.innerHTML = `

      <button class="btn ${_opFilter==='ACTIVA'?'btn-primary':'btn-secondary'}" onclick="setOpFilter('ACTIVA')">Activas <span style="opacity:0.7;">${counts.ACTIVA}</span></button>

  _opFilter = status;
  const card = document.getElementById('ops-table-card');
  if (card) card.innerHTML = opsTableInner(status);

  document.querySelectorAll('.ops-filter-btn').forEach(b => {
    b.classList.toggle('btn-primary', b.dataset.status === status);
    b.classList.toggle('btn-secondary', b.dataset.status !== status);

  // re-render the whole view to update button styles cleanly
  const el = document.getElementById('content');
  const actions = document.getElementById('topbar-actions');
  renderOperaciones(el, actions);
}

// ─── INTERACTION HANDLERS ──────────────────────────────────────────────────
function cycleChk(opId, key) {
  const o = DATA.operations.find(x=>x.id===opId);
  if (!o) return;
  // Lease y estoppel solo tienen dos estados: true/false
  const boolOnly = ['leaseAgreementSent','estoppelSent'];
  if (boolOnly.includes(key)) {
    o[key] = !o[key];
  } else {
    const cycle = { true: false, false: 'na', na: true };
    o[key] = cycle[String(o[key])];
  }
  const cell = document.getElementById(`chk-${opId}-${key}`);
  if (cell) cell.innerHTML = chkCell(o[key], opId, key);
  refreshProgress(opId);
}
function refreshProgress(opId) {
  const o = DATA.operations.find(x=>x.id===opId);
  if (!o) return;
  const prog = calcProgress(o);
  const bar = document.getElementById('chk-bar');
  const pctEl = document.getElementById('chk-pct');
  const countEl = document.getElementById('chk-count');
  if (bar) bar.style.width = prog.pct + '%';
  if (pctEl) pctEl.textContent = prog.pct + '% completado';
  if (countEl) countEl.textContent = prog.done + '/' + prog.total + ' completados';
}
function changeStatus(opId, newStatus) {
  const o = DATA.operations.find(x=>x.id===opId);
  if (!o) return;
  const prev = o.status;
  o.status = newStatus;
  const colors = { ACTIVA:'var(--amber)', CERRADA:'var(--green)', CANCELADA:'var(--red)' };
  const sel = document.getElementById(`status-select-${opId}`);
  if (sel) { sel.style.borderColor = colors[newStatus]; sel.style.color = colors[newStatus]; }
  toast(`Estado cambiado: ${prev} → ${newStatus}`);
}
function changeInspStatus(opId, val) {
  const o = DATA.operations.find(x=>x.id===opId);
  if (o) { o.inspStatus = val; toast('✓ Estado de inspección actualizado'); }
}
function changeInspNotes(opId, val) {
  const o = DATA.operations.find(x=>x.id===opId);
  if (o) o.inspNotes = val;
}
function changeAppraisal(opId, val) {
  const o = DATA.operations.find(x=>x.id===opId);
  if (o) { o.appraisal = val === 'No aplica' ? 'na' : val; toast('✓ Appraisal actualizado'); }
}
function o_financing(opId, val) {
  const o = DATA.operations.find(x=>x.id===opId);
  if (o) { o.financing = val; toast('✓ Financiamiento actualizado'); }
}
function changeRealtor(opId, val) {
  const o = DATA.operations.find(x=>x.id===opId);
  if (o) { o.realtor = val; toast('✓ Realtor actualizado'); }
}
function handleDocUpload(opId, input) {
  const files = Array.from(input.files);
  if (!files.length) return;
  const list = document.getElementById(`docs-list-${opId}`);
  if (!list) return;
  const today = new Date().toLocaleDateString('es-AR',{day:'numeric',month:'short'});
  files.forEach(f => {
    const item = document.createElement('div');
    item.className = 'doc-item';
    item.innerHTML = `<span>📄 ${f.name}</span><span style="font-size:11px;color:var(--green);">✓ Subido ${today}</span>`;
    list.appendChild(item);
  });
  toast(`✓ ${files.length} documento${files.length>1?'s':''} subido${files.length>1?'s':''}`);
  input.value = '';
}
function changeInspEstimatedDate(opId, val) {
  const o = DATA.operations.find(x=>x.id===opId);
  if (!o) return;
  o.inspEstimatedDate = val;
  // Re-render the alert inline inside the inspection card
  const dateInput = document.getElementById(`insp-date-${opId}`);
  if (dateInput) dateInput.value = val;
  if (val) {
    const days = getDaysUntil(val);
    if (days !== null && days <= 2) {
      const txt = days < 0 ? `⚠ Fecha de inspección vencida hace ${Math.abs(days)} día${Math.abs(days)===1?'':'s'}` :
                  days === 0 ? '🔍 Inspección estimada HOY' :
                               `🔍 Inspección estimada en ${days} día${days===1?'':'s'}`;
      const cls = days < 0 ? 'danger' : 'warning';
      toast(`🔍 Recordatorio guardado — ${txt.replace(/^[^\s]+\s/,'')}`);
    } else {
      toast('✓ Fecha de inspección guardada');
    }
  } else {
    toast('Fecha de inspección borrada');
  }
}

function toggleRented(opId) {
  const o = DATA.operations.find(x=>x.id===opId);
  if (!o) return;
  o.isRented = !o.isRented;
  const toggle = document.getElementById(`toggle-rented-${opId}`);

function handleGlobalDocUpload() {
  const input=document.createElement('input');input.type='file';input.accept='.pdf,.doc,.docx,image/*';input.multiple=true;
  input.onchange=e=>{
    Array.from(e.target.files).forEach(file=>{
      const url=URL.createObjectURL(file);
      if(!window._globalDocs)window._globalDocs=[];
      window._globalDocs.push({name:file.name,prop:'',date:new Date().toLocaleDateString('es-AR'),url});
    });
    renderDocumentos(document.getElementById('main-content'),document.getElementById('view-actions'));
    toast('\u2713 '+e.target.files.length+' documento(s) cargado(s)');
  };input.click();
}

// ─── COMISIONES ────────────────────────────────────────────────────────────
window._comPct = { agente:50, realtor:20, broker:30, agenteSin:70, brokerSin:30 };
window._rowPct = {}; // per-operation overrides

function _calcCom(o) {
  const rp = window._rowPct[o.id]||{};
  const gp = window._comPct;
  const total = (o.compFixed && o.compFixed>0) ? o.compFixed : (o.price>0 ? o.price*((o.compPct||0)/100) : 0);
  const hasR = o.realtor && o.realtor !== 'none';
  const pA = rp.A !== undefined ? rp.A : (hasR ? gp.agente : gp.agenteSin);
  const pR = rp.R !== undefined ? rp.R : (hasR ? gp.realtor : 0);
  const pB = rp.B !== undefined ? rp.B : (hasR ? gp.broker : gp.brokerSin);
  return { total, pA, pR, pB, mA:total*pA/100, mR:total*pR/100, mB:total*pB/100 };
}

function updateRowPct(opId, who, val) {
  if (!window._rowPct[opId]) window._rowPct[opId] = {};
  window._rowPct[opId][who] = parseFloat(val)||0;
  const o = DATA.operations.find(x=>x.id===opId);
  if (!o) return;
  const c = _calcCom(o);
  const eA=document.getElementById('cmA-'+opId);
  const eR=document.getElementById('cmR-'+opId);
  const eB=document.getElementById('cmB-'+opId);
  if(eA) eA.textContent='$'+Math.round(c.mA).toLocaleString();
  if(eR) eR.textContent='$'+Math.round(c.mR).toLocaleString();
  if(eB) eB.textContent='$'+Math.round(c.mB).toLocaleString();
  // update total row
  const eT=document.getElementById('cmT-'+opId);
  if(eT) eT.textContent='$'+Math.round(c.total).toLocaleString();
}

function recalcComisiones() {
  const p = window._comPct;
  p.agente   = parseFloat(document.getElementById('com-agente-con').value)||0;
  p.realtor  = parseFloat(document.getElementById('com-realtor-con').value)||0;
  p.broker   = parseFloat(document.getElementById('com-broker-con').value)||0;
  p.agenteSin= parseFloat(document.getElementById('com-agente-sin').value)||0;
  p.brokerSin= parseFloat(document.getElementById('com-broker-sin').value)||0;
  // Reset row overrides and re-render table
  window._rowPct = {};
  const ops = DATA.operations.filter(o=>o.status==='ACTIVA'||o.status==='CERRADA');
  document.getElementById('com-pending-body') && (document.getElementById('com-pending-body').innerHTML=buildComRows(ops,false));
  document.getElementById('com-paid-body') && (document.getElementById('com-paid-body').innerHTML=buildComRows(ops,true));
  const totalCom=ops.reduce((s,o)=>s+_calcCom(o).total,0);
  const totalPaid=ops.filter(o=>o.commissionPaid).reduce((s,o)=>s+_calcCom(o).total,0);
  const totalPending=totalCom-totalPaid;
  const totalBroker=ops.reduce((s,o)=>s+_calcCom(o).mB,0);
  document.getElementById('com-total').textContent='$'+Math.round(totalCom).toLocaleString();
  document.getElementById('com-broker').textContent='$'+Math.round(totalBroker).toLocaleString();
  const sumCon=p.agente+p.realtor+p.broker, sumSin=p.agenteSin+p.brokerSin;
  const warn=document.getElementById('com-pct-warn');
  if(warn){ if(sumCon!==100||sumSin!==100){warn.textContent='⚠ Deben sumar 100% (con realtor: '+sumCon+'%, sin realtor: '+sumSin+'%)';warn.style.display='block';}else{warn.style.display='none';}}
}

function toggleCommissionPaid(id) {
  const o=DATA.operations.find(x=>x.id===id);
  if(!o)return;
  o.commissionPaid=!o.commissionPaid;
  const el=document.getElementById('main-content');
  const act=document.getElementById('view-actions');
  if(el&&act)renderComisiones(el,act);
}
function buildComRows(ops, paid) {
  const filtered=ops.filter(o=>(!!o.commissionPaid)===paid);
  if(!filtered.length)return '<tr><td colspan="8" style="text-align:center;color:var(--text-3);padding:16px;font-size:12px;">Sin comisiones en esta secci\u00f3n</td></tr>';
  return filtered.map(o=>{
    const c=_calcCom(o);
    const inp='type="number" style="width:52px;padding:3px 5px;font-size:11px;" class="form-input" min="0" max="100"';
    const comStr=c.total>0?'$'+Math.round(c.total).toLocaleString():'\u2014';
    const paidBtn=o.commissionPaid
      ?'<button onclick="toggleCommissionPaid('+o.id+')" style="font-size:10px;padding:3px 10px;background:#E3F9EE;color:#1A7A45;border:1px solid #1A7A4540;border-radius:8px;cursor:pointer;">\u2713 Paga</button>'
      :'<button onclick="toggleCommissionPaid('+o.id+')" style="font-size:10px;padding:3px 10px;background:#FFF4E3;color:#B86A00;border:1px solid #B86A0040;border-radius:8px;cursor:pointer;">\u23f3 Marcar paga</button>';
    return '<tr style="opacity:'+(o.commissionPaid?'.65':'1')+';">'
      +'<td><div class="prop-name">'+o.address+'</div><div class="prop-sub">'+(o.closingDate||o.closingDateISO||'')+'</div></td>'
      +'<td style="font-weight:600;">'+(o.price>0?'$'+o.price.toLocaleString():'\u2014')+'</td>'
      +'<td>'+(o.compFixed>0?'$'+o.compFixed.toLocaleString()+(o.compPct?' / '+o.compPct+'%':''):(o.compPct?o.compPct+'%':'\u2014'))+'</td>'
      +'<td style="font-weight:700;color:var(--gold-dark);" id="cmT-'+o.id+'">'+comStr+'</td>'
      +'<td><div style="font-size:12px;">'+agentName(o.agent)+'</div>'
      +'<div style="display:flex;align-items:center;gap:4px;margin-top:3px;"><input '+inp+' value="'+c.pA+'" oninput="updateRowPct('+o.id+',\'A\',this.value)"><span style="font-size:10px;color:var(--text-3);">% <span id="cmA-'+o.id+'" style="font-weight:600;">$'+Math.round(c.mA).toLocaleString()+'</span></span></div></td>'
      +'<td><div style="font-size:12px;">'+realtorName(o.realtor)+'</div>'
      +(c.pR>0?'<div style="display:flex;align-items:center;gap:4px;margin-top:3px;"><input '+inp+' value="'+c.pR+'" oninput="updateRowPct('+o.id+',\'R\',this.value)"><span style="font-size:10px;color:var(--text-3);">% <span id="cmR-'+o.id+'" style="font-weight:600;">$'+Math.round(c.mR).toLocaleString()+'</span></span></div>':'<div style="font-size:11px;color:var(--text-3);">\u2014</div>')+'</td>'
      +'<td><div style="font-size:12px;">Miami Tango</div>'
      +'<div style="display:flex;align-items:center;gap:4px;margin-top:3px;"><input '+inp+' value="'+c.pB+'" oninput="updateRowPct('+o.id+',\'B\',this.value)"><span style="font-size:10px;color:var(--text-3);">% <span id="cmB-'+o.id+'" style="font-weight:600;">$'+Math.round(c.mB).toLocaleString()+'</span></span></div></td>'
      +'<td>'+paidBtn+'</td>'
      +'</tr>';
  }).join('');
}

function renderComisiones(el, actions) {
  actions.innerHTML = '<button class="btn btn-secondary" onclick="downloadComisionesReport()" style="font-size:12px;">&#x2b07; Descargar Excel</button>';
  // Only show active operations (historical cerradas are archived)
  const ops = DATA.operations.filter(o=>o.status==='ACTIVA'||o.commissionPaid===true);
  const totalCom = ops.reduce((s,o)=>s+_calcCom(o).total,0);
  const totalPaid = ops.filter(o=>o.commissionPaid).reduce((s,o)=>s+_calcCom(o).total,0);
  const totalPending = totalCom - totalPaid;
  const totalBroker = ops.filter(o=>!o.commissionPaid).reduce((s,o)=>s+_calcCom(o).mB,0);
  el.innerHTML='<div class="stats-grid" style="grid-template-columns:repeat(4,1fr);">'
    +'<div class="stat-card"><div class="stat-label">&#x1f4b0; Total comisiones</div><div class="stat-val gold" id="com-total">$'+Math.round(totalCom).toLocaleString()+'</div><div class="stat-sub">'+ops.length+' operaciones</div></div>'
    +'<div class="stat-card"><div class="stat-label">&#x23f3; Pendientes</div><div class="stat-val" style="color:var(--amber);">$'+Math.round(totalPending).toLocaleString()+'</div><div class="stat-sub">'+ops.filter(o=>!o.commissionPaid).length+' sin cobrar</div></div>'
    +'<div class="stat-card"><div class="stat-label">&#x2713; Cobradas</div><div class="stat-val green">$'+Math.round(totalPaid).toLocaleString()+'</div><div class="stat-sub">'+ops.filter(o=>o.commissionPaid).length+' pagadas</div></div>'
    +'<div class="stat-card"><div class="stat-label">&#x1f3e2; Miami Tango</div><div class="stat-val" style="color:var(--blue);" id="com-broker">$'+Math.round(totalBroker).toLocaleString()+'</div><div class="stat-sub">Parte del broker</div></div>'
    +'</div>'
    +'<div class="card" style="margin-bottom:16px;"><div class="card-header"><span class="card-title">&#x23f3; Comisiones pendientes de cobro</span></div>'
    +'<div class="card-body" style="overflow-x:auto;"><table>'
    +'<thead><tr><th>Propiedad</th><th>Precio</th><th>Comp</th><th>Comisión</th><th>Agente</th><th>Realtor</th><th>Broker</th><th>Estado</th></tr></thead>'
    +'<tbody id="com-pending-body">'+buildComRows(ops,false)+'</tbody>'
    +'</table></div></div>'
    +'<div class="card"><div class="card-header"><span class="card-title">&#x2713; Comisiones pagadas</span></div>'
    +'<div class="card-body" style="overflow-x:auto;"><table>'
    +'<thead><tr><th>Propiedad</th><th>Precio</th><th>Comp</th><th>Comisión</th><th>Agente</th><th>Realtor</th><th>Broker</th><th>Estado</th></tr></thead>'
    +'<tbody id="com-paid-body">'+buildComRows(ops,true)+'</tbody>'
    +'</table></div></div>';
}
function downloadComisionesReport() {
  const ops = DATA.operations.filter(o=>o.status==='ACTIVA'||o.status==='CERRADA');
  let csv = 'Propiedad,Estado,Precio,Comp%,Total,Agente,$ Agente,Realtor,$ Realtor,Broker,$ Broker\n';
  ops.forEach(o=>{
    const c=_calcCom(o);
    csv+='"'+o.address+'",'+o.status+','+o.price+','+o.compPct+'%,'+Math.round(c.total)+','+agentName(o.agent)+','+Math.round(c.mA)+','+realtorName(o.realtor)+','+Math.round(c.mR)+',Miami Tango,'+Math.round(c.mB)+'\n';
  });
  const blob=new Blob([csv],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='comisiones_'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  toast('\u2713 Reporte descargado');
}

// ─── MODAL & UTILS ─────────────────────────────────────────────────────────
function registrarContactoHoy(id) {
  const l = DATA.leads.find(x=>x.id===id);
  if (!l) return;
  const today = new Date().toISOString().slice(0,10);
  l.lastContact = today;
  l.contactHistory = l.contactHistory||[];
  l.contactHistory.push({date:today, notes:'Contacto registrado'});
  toast('📞 Contacto registrado — '+l.name+' ('+today+')');
  goTo('leads');
}
function registrarContactoLead(id, notes) {
  const l = DATA.leads.find(x=>x.id===id);
  if (!l) return;
  l.contactHistory = l.contactHistory||[];
  const today = new Date().toISOString().slice(0,10);
  const inp = document.getElementById('lh-notes-'+id);
  const notesVal = (notes && notes.trim()) ? notes.trim() : (inp ? inp.value.trim() : '') || 'Contacto registrado';
  l.contactHistory.push({date:today, notes:notesVal});
  l.lastContact = today;
  if (inp) inp.value = '';
  toast('📞 '+notesVal+' — '+l.name+' ('+today+')');
  const mTitle = document.getElementById('modal-title');
  if (mTitle && mTitle.textContent === l.name) openLeadDetail(id);
  else goTo('leads');
}
function o_buyerName(id, val) {
  const o = DATA.operations.find(x=>x.id===id);
  if (o) { o.buyerName = val.trim(); toast('✓ Comprador actualizado'); }
}
function saveAndCloseLead(id){toast('✓ Lead actualizado');closeModal();goTo('leads');}
function saveAndCloseCliente(id){toast('✓ Cliente actualizado');closeModal();goTo('clientes');}
function togglePaisInput(sel) {
  var inp = document.getElementById('lead-pais-custom');
  if (inp) inp.style.display = sel.value === 'other' ? 'block' : 'none';
}
function closeModal() { document.getElementById('modal-overlay').classList.add('hidden'); }
document.getElementById('modal-overlay').addEventListener('click', function(e) { if(e.target===this) closeModal(); });
function toast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#1A1A18;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;box-shadow:0 4px 16px rgba(0,0,0,0.2);';
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 2500);
}

goTo('dashboard');
</script>
